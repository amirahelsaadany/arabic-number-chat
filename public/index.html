<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>محوّل الأرقام</title>
<style>
  :root {
    --bg: #f6f4ef;
    --panel: #ffffff;
    --accent: #2f6f5e;
    --accent-dark: #1f4f43;
    --text: #23281f;
    --muted: #7a7f74;
    --bubble-user: #2f6f5e;
    --bubble-bot: #eef0e9;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px;
  }

  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    height: 85vh;
    overflow: hidden;
  }

  header {
    padding: 18px 20px;
    background: var(--accent);
    color: #fff;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
  }

  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.85;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.6;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: var(--bubble-user);
    color: #fff;
    border-bottom-left-radius: 4px;
  }

  .bubble.bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .bubble.bot .label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  form {
    display: flex;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid #eee;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
  }

  button:hover { background: var(--accent-dark); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .empty-hint {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>محوّل الأرقام</h1>
    <p>اكتب رسالة فيها أرقام، وشوف كيف تتحول إلى كلمات عربية</p>
  </header>

  <div class="messages" id="messages">
    <div class="empty-hint">جرّبي مثلاً: «موعدك الساعة 9:30 والفاتورة 5000 ريال»</div>
  </div>

  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="اكتبي رسالتك هنا..." autocomplete="off" />
    <button type="submit" id="send-btn">إرسال</button>
  </form>
</div>

<script>
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const messages = document.getElementById('messages');
  const sendBtn = document.getElementById('send-btn');

  function addBubble(text, type, label) {
    const hint = messages.querySelector('.empty-hint');
    if (hint) hint.remove();

    const bubble = document.createElement('div');
    bubble.className = `bubble ${type}`;

    if (label) {
      const labelEl = document.createElement('span');
      labelEl.className = 'label';
      labelEl.textContent = label;
      bubble.appendChild(labelEl);
    }

    const textNode = document.createTextNode(text);
    bubble.appendChild(textNode);

    messages.appendChild(bubble);
    messages.scrollTop = messages.scrollHeight;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addBubble(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    try {
      const res = await fetch('/api/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBubble(err.error || 'حدث خطأ غير متوقع.', 'bot', 'خطأ');
        return;
      }

      const data = await res.json();
      addBubble(data.converted, 'bot', 'الرد المحوّل');
    } catch (err) {
      addBubble('تعذر الاتصال بالسيرفر. تأكدي أن السيرفر يعمل.', 'bot', 'خطأ');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
